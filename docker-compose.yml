services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Secrets live in backend/.env; Compose only reads ./.env for ${...} in this file.
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      REDIS_URL: redis://redis:6379
      ML_PYTHON_BIN: python3
      ML_INFERENCE_TIMEOUT_MS: ${ML_INFERENCE_TIMEOUT_MS:-10000}
      ML_MANIFEST_PATH: ${ML_MANIFEST_PATH:-models/integration_contracts/winner_upgrade_v5/winner_v5_serving_manifest.json}
      ML_ARTIFACT_PATH: ${ML_ARTIFACT_PATH:-models/integration_contracts/winner_upgrade_v5/winner_v5_serving_artifact.pkl}
    depends_on:
      - redis
      - mongodb
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  mongodb:
    image: mongo:6
    container_name: barclays-mongo
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
