<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Barclays Blue Background -->
  <rect width="100" height="100" fill="#003D82" rx="8"/>
  
  <!-- Barclays Eagle/Wing Symbol (simplified) -->
  <g fill="white">
    <!-- Left wing -->
    <path d="M 30 50 Q 35 40 42 38 Q 40 45 35 50 Q 40 45 42 38 Z" opacity="0.9"/>
    
    <!-- Center element -->
    <circle cx="50" cy="50" r="8" fill="white"/>
    
    <!-- Right wing -->
    <path d="M 70 50 Q 65 40 58 38 Q 60 45 65 50 Q 60 45 58 38 Z" opacity="0.9"/>
    
    <!-- Horizontal bar -->
    <rect x="30" y="60" width="40" height="3" fill="white"/>
  </g>
  
  <!-- White accent stripe (Barclays signature) -->
  <rect x="0" y="32" width="100" height="4" fill="white" opacity="0.3"/>
</svg>
